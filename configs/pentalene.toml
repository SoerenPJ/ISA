# Pentalene 13-site preset (matches TiBOX graphene_molecule ncells=4.5).
# Remove configs/pentalene.toml and the pentalene block in params.cpp if not needed.
[system]
lattice = "pentalene"

[hamiltonian]
t1 = -2.8
t2 = -2.8
mu = 0.0
gamma = 0.05
spin_on = false

[simulation]
use_strict_solver = true
dt = 0.01
t0 = 0.0
t_max = 1000.0
a_tol = 1e-10
r_tol = 1e-12

[field]
intensity = 1e13
mode = "time_impulse"
phase = 0.0
omega = 0.5
t_shift = 500.0
sigma_gaus = 100
sigma_ddf = 0.01
B_ext = false

[analysis]
omega_cut_off = 20
fourier_dt_fs = 0.0025

[thermo]
T = 300

[features]
coulomb = true
coulomb_onsite_eV = 10.0
self_consistent_phase = false
zeeman_external = false
zeeman_induced = false
