[system]
lattice = "graphene"
formation_shape = "bowtie" # rectangle | triangle
formation = "zigzag"
size_x = 10
size_y = 10
rotation_angle_deg = 0

# bond length (nm)
lattice_const = 0.14210

[hamiltonian]
t1 = -2.8
t2 = -2.8
mu = 2.3
gamma = 0.05
spin_on = true


[simulation]
use_strict_solver = false
dt = 0.01
t0 = 0.0
t_max = 180.0
a_tol = 1e-10
r_tol = 1e-8

[field]
intensity = 1e15
mode = "ddf"         #time_impulse
phase = 0.0
omega = 3.8799918918
t_shift = 500.0
sigma_gaus = 100     #60.07
sigma_ddf = 0.01
B_ext = false

[analysis]
omega_cut_off = 5
fourier_dt_fs = 0.01   # for pretty 0.001 or 0.005. HHG
run_sigma_ext = true
run_dipole_acc = false #true

[thermo]
T = 300
use_charge_doping = false # if true, ignore mu for Rho_0
Q_doping = 8.0            # total extra electrons relative to neutral

[features]
coulomb = true
coulomb_onsite_eV = 20.0     # Hubbard U (eV),
self_consistent_phase = true # L1: no induced Peierls phases; set true for L2
zeeman_external = true
zeeman_induced = true        # L1: Biot-Savart B_ind -> Zeeman (requires spin_on=true)
